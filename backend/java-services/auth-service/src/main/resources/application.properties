spring.application.name=auth-service
server.port=8081

spring.data.mongodb.uri=mongodb://localhost:27017/devops_auth_db

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

jwt.secret=DEVOPS_CONTROL_CENTER_SUPER_SECRET_KEY_2026_CHANGE_IN_PRODUCTION_1234567890_ABCDEFG
jwt.access-token-expiration-minutes=15
jwt.refresh-token-expiration-days=7

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.file.name=../../../logs/auth/auth-service.log
