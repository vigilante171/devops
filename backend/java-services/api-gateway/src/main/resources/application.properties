spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=project-service
spring.cloud.gateway.routes[1].uri=lb://PROJECT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/projects/**

spring.cloud.gateway.routes[2].id=pipeline-service
spring.cloud.gateway.routes[2].uri=lb://PIPELINE-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/pipelines/**

spring.cloud.gateway.routes[3].id=deployment-service
spring.cloud.gateway.routes[3].uri=lb://DEPLOYMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/deployments/**

spring.cloud.gateway.routes[4].id=monitoring-service
spring.cloud.gateway.routes[4].uri=lb://MONITORING-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/monitoring/**

spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[6].id=audit-service
spring.cloud.gateway.routes[6].uri=lb://AUDIT-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/audit/**

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=http://localhost:*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

logging.file.name=../../../logs/gateway/api-gateway.log
